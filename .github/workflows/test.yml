name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deterministic test dependencies
        run: python -m pip install -e ".[dev,mcp]"

      - name: Unit tests
        run: python -m pytest -q

      - name: Ruff
        run: python -m ruff check apeiron tests

      - name: Mypy
        run: python -m mypy apeiron

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

  network-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install fetch extras
        run: python -m pip install -e ".[fetch]"

      - name: Fetch example.com
        run: |
          python - <<'PY'
          from apeiron import fetch_sync
          result = fetch_sync("https://example.com", cache_ttl=0)
          print(result.verdict.value, result.tier.value, len(result.content))
          assert result.verdict.value == "success"
          assert result.content
          PY
